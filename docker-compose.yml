version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: chess_postgres_db
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess
      POSTGRES_DB: chess
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess -d chess"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chess_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- PHASE_2.md Step 7: multi-instance cluster -------------------------
  # Only started via `make docker-up-cluster` (docker compose --profile
  # cluster up), not by plain `make docker-up` (postgres+redis only, for
  # local single-instance `go run` dev — unaffected by the profile tag
  # below, since explicitly-named services start regardless of profile).
  #
  # TD-008 still open at this step (CLAUDE.md's Technical Debt table): both
  # server1 and server2 still run main.go's own runMigrations on their own
  # startup, serialized (not broken) by golang-migrate's advisory lock, but
  # not the final design. PHASE_2.md's own Step 9 checklist ("server
  # replicas depends_on: condition: service_completed_successfully") reads
  # as already assuming these two services exist — so this step
  # deliberately creates them with today's still-TD-008-open behavior
  # unchanged, and Step 9 will add the one-shot `migrate` service plus the
  # depends_on gating that actually closes it (DECISIONS_LOG_PHASE_2.md
  # ADR-025).
  #
  # Neither server1 nor server2 publishes a host port — the entire point of
  # Phase 2's resolve-then-connect design (ADR-022) is that a client never
  # dials an instance directly; only nginx's port is public.
  server1:
    build: .
    container_name: chess_server1
    profiles: ["cluster"]
    environment:
      DATABASE_URL: postgres://chess:chess@postgres:5432/chess?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: "8080"
      LOG_LEVEL: info
      REDIS_ADDR: redis:6379
      INSTANCE_ID: server1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  server2:
    build: .
    container_name: chess_server2
    profiles: ["cluster"]
    environment:
      DATABASE_URL: postgres://chess:chess@postgres:5432/chess?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: "8080"
      LOG_LEVEL: info
      REDIS_ADDR: redis:6379
      INSTANCE_ID: server2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: chess_nginx
    profiles: ["cluster"]
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      server1:
        condition: service_healthy
      server2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
