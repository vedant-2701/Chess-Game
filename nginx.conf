# ============================================================
# nginx Edge Proxy — PHASE_2.md Step 7 / ADR-022
# ============================================================
# Two distinct jobs, deliberately kept separate:
#
#   1. REST API (POST /games, POST /games/:id/join, GET /games/:id,
#      GET /games/:id/resolve, GET /health): plain round-robin. Every one of
#      these is stateless — no game-affinity needed, no decision-making
#      beyond "pick any healthy backend."
#
#   2. WebSocket Edge Proxy (/connect/{instanceLabel}): a static
#      label -> upstream map, mechanically dereferenced. nginx makes NO
#      routing decision here — the decision (which instance legitimately
#      owns this game) was already made by the resolve endpoint
#      (internal/game Manager.ResolveGame) and is encoded in the opaque
#      {instanceLabel} URL segment the client was told to dial. See
#      DECISIONS_LOG_PHASE_2.md ADR-022: "Client-visible topology... is
#      never exposed in either token or endpoint — instanceLabel is an
#      opaque identifier meaningful only to the Edge Proxy's static map, not
#      a real address."
#
# Adding a new server instance requires an edit to the map below plus an
# nginx reload — this is TD-P2-002 (PHASE_2.md's Technical Debt table),
# deliberately not solved here. Phase 8's move to Kubernetes
# Service/ingress-nginx replaces this static map with dynamic service
# discovery; introducing that machinery now, before Phase 8, would be
# exactly the kind of ahead-of-need complexity this project has repeatedly
# declined to build early (see DECISIONS_LOG_PHASE_2.md ADR-023's TD-P2-001
# reasoning, which states the same discipline explicitly).
# ============================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Docker Compose's embedded DNS server. Required because proxy_pass
    # below uses a variable ($connect_upstream), not a static `upstream{}`
    # block name — nginx only re-resolves variable-based proxy_pass targets
    # via an explicit resolver directive, not automatically like it does for
    # named upstream blocks. valid=30s matches Compose's own DNS TTL
    # behavior closely enough for this deliberately simple, static-map
    # design; it is not attempting to track live container health via DNS.
    resolver 127.0.0.11 valid=30s;

    # --- REST: plain round-robin --------------------------------------
    # No game-affinity awareness needed or wanted here — see file header.
    upstream chess_rest {
        server server1:8080;
        server server2:8080;
    }

    # --- WebSocket Edge Proxy: static label -> upstream map ------------
    # Keys are INSTANCE_ID values (see docker-compose.yml's server1/server2
    # environment) — in this local docker-compose setup they happen to
    # equal the Compose service/DNS name too, which is a convenience of this
    # specific deployment, not a general requirement InstanceLabel imposes.
    # default "" (empty) is deliberately falsy — the server{} block below
    # checks for it explicitly and returns 502 for an unrecognized label,
    # rather than silently proxy_pass-ing to an empty target.
    map $instance_label $connect_upstream {
        server1  server1:8080;
        server2  server2:8080;
        default  "";
    }

    server {
        listen 80;

        # Health check — proxied round-robin like the rest of the REST API;
        # both instances' /health is stateless and interchangeable, so which
        # one actually answers doesn't matter.
        location /health {
            proxy_pass http://chess_rest;
        }

        # REST API — game creation, joining, plain GET, and the resolve
        # endpoint. All stateless; round-robin is correct and sufficient.
        location /games {
            proxy_pass http://chess_rest;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WebSocket Edge Proxy — mechanical dereference only, see file
        # header. No trailing path segment: PHASE_2.md's masked URL shape is
        # exactly /connect/{instanceLabel}, nothing after it — the gameID
        # lives inside the signed ConnectClaims token (?token=...), not the
        # URL path, so there is deliberately no /connect/{label}/game/{id}
        # segment to route on here.
        location ~ ^/connect/(?<instance_label>[^/]+)$ {
            set $connect_upstream_resolved $connect_upstream;
            if ($connect_upstream_resolved = "") {
                return 502; # unrecognized/misconfigured instance label
            }

            proxy_pass http://$connect_upstream_resolved;

            # WebSocket upgrade headers — required for the upgrade
            # handshake to succeed through the proxy at all. $http_upgrade
            # is nginx's built-in reference to the client's own Upgrade
            # request header, forwarded through unchanged.
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Long timeouts — a WebSocket connection is long-lived by
            # design (an entire chess game, potentially tens of minutes),
            # not a request/response cycle. nginx's default
            # proxy_read_timeout (60s) would silently kill an idle-but-
            # legitimate connection mid-game.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
